name: Weekly Scrape

on:
  schedule:
    - cron: "0 9 * * 0"  # Every Sunday 9am UTC (≈ 3am Mountain Time)
  workflow_dispatch:      # Allow manual runs from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python westword_scraper.py

      - name: Run geocode enrichment
        run: python enrich_geocode.py

      - name: Generate maps
        run: |
          python generate_map.py
          python generate_map_v2.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add westword_openings_closings.csv westword_enriched.csv map.html map2.html westword_seen_urls.txt
          for f in westword_duplicates.csv westword_location_entries.csv westword_geocode_errors.csv; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet || git commit -m "chore: weekly data update $(date -u '+%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/tcadieux/DenverRestaurant.git HEAD:main
